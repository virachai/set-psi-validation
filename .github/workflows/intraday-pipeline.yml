name: Intraday Market Cycle

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "pyproject.toml"
      - ".github/workflows/**"
  schedule:
    - cron: "0 * * * *" # test
    # - cron: "0 2 * * 1-5" # 09:00 ICT - Prediction Capture (AM + Full Day)
    # - cron: "0 3 * * 1-5" # 10:00 ICT - ATO Capture
    # - cron: "0 7 * * 1-5" # 14:00 ICT - Prediction Capture (PM)
    # - cron: "30 9 * * 1-5" # 16:30 ICT - ATC Capture
    # - cron: "0 10 * * 1-5" # 17:00 ICT - Validation & Metrics
  workflow_dispatch:
    inputs:
      step:
        description: "Step to run"
        required: true
        default: "all"
        type: choice
        options:
          - prediction-am
          - ato
          - prediction-pm
          - atc
          - validation
          - all

permissions:
  contents: write

jobs:
  market-cycle:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Dependencies are handled per-script via PEP 723 inline metadata.
      # uv run auto-installs dependencies declared in each script.

      - name: Determine Step
        id: step-decider
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "step=${{ github.event.inputs.step }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            echo "step=all" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [[ "$HOUR" == "02" ]]; then echo "step=prediction-am" >> $GITHUB_OUTPUT;
            elif [[ "$HOUR" == "03" ]]; then echo "step=ato" >> $GITHUB_OUTPUT;
            elif [[ "$HOUR" == "07" ]]; then echo "step=prediction-pm" >> $GITHUB_OUTPUT;
            elif [[ "$HOUR" == "09" ]]; then echo "step=atc" >> $GITHUB_OUTPUT;
            elif [[ "$HOUR" == "10" ]]; then echo "step=validation" >> $GITHUB_OUTPUT;
            else echo "step=all" >> $GITHUB_OUTPUT; fi
          fi

      - name: Run Prediction Capture (AM & Full Day)
        if: steps.step-decider.outputs.step == 'prediction-am' || steps.step-decider.outputs.step == 'all'
        run: |
          echo "Running Prediction Capture for AM & Full Day at 09:00 ICT..."
          uv run scripts/python/predictions_loader.py --session am
          uv run scripts/python/predictions_loader.py --session full_day
        env:
          PSI_ENGINE_API_KEY: ${{ secrets.PSI_ENGINE_API_KEY }}
          PSI_API_URL: ${{ secrets.PSI_API_URL }}
          RAPIDAPI_HOST: ${{ secrets.RAPIDAPI_HOST }}

      - name: Run ATO Capture
        if: steps.step-decider.outputs.step == 'ato' || steps.step-decider.outputs.step == 'all'
        run: |
          echo "Running ATO Capture at 10:00 ICT..."
          uv run scripts/python/capture_market.py --mode ato --symbol ${{ vars.SET_INDEX_SYMBOL || 'SET' }}
        env:
          SETSMART_API_KEY: ${{ secrets.SETSMART_API_KEY }}

      - name: Run Prediction Capture (PM)
        if: steps.step-decider.outputs.step == 'prediction-pm' || steps.step-decider.outputs.step == 'all'
        run: |
          echo "Running Prediction Capture for PM at 14:00 ICT..."
          uv run scripts/python/predictions_loader.py --session pm
        env:
          PSI_ENGINE_API_KEY: ${{ secrets.PSI_ENGINE_API_KEY }}
          PSI_API_URL: ${{ secrets.PSI_API_URL }}
          RAPIDAPI_HOST: ${{ secrets.RAPIDAPI_HOST }}

      - name: Run ATC Capture
        if: steps.step-decider.outputs.step == 'atc' || steps.step-decider.outputs.step == 'all'
        run: |
          echo "Running ATC Capture at 16:30 ICT..."
          uv run scripts/python/capture_market.py --mode atc --symbol ${{ vars.SET_INDEX_SYMBOL || 'SET' }}
        env:
          SETSMART_API_KEY: ${{ secrets.SETSMART_API_KEY }}

      - name: Run Validation & Metrics
        if: steps.step-decider.outputs.step == 'validation' || steps.step-decider.outputs.step == 'all'
        run: |
          echo "Running Validation & Metrics at 17:00 ICT..."
          uv run scripts/python/validation_engine.py

      - name: Enrich JSON files with schema.org JSON-LD
        if: success()
        run: |
          echo "Adding schema.org @context/@type to data artifacts..."
          uv run scripts/python/jsonld_enricher.py

      - name: Commit and Push changes
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # Only add files if they exist to avoid git add error
          find market-data predictions reports validation -maxdepth 1 -name "*.json" -exec git add {} + 2>/dev/null || true
          git add catalog.json docs/010-regime-taxonomy-v01.json || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated market data update: $(date +'%Y-%m-%d') (${{ github.event_name }})"
          git push
