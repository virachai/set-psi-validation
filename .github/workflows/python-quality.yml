name: Python Quality

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Dependencies are handled per-script via PEP 723 inline metadata.
      # uv run auto-installs dependencies declared in each script.

      - name: Lint with Ruff
        run: |
          uv run ruff --version
          uv run ruff check --verbose --show-source scripts/ tests/

      - name: Check formatting with Black
        run: |
          uv run black --check scripts/ tests/

      - name: Check types with Mypy
        run: |
          uv run mypy scripts/ tests/

      - name: Check documentation naming
        run: |
          uv run scripts/python/validate_docs.py

      - name: Run tests
        run: |
          uv run pytest -q
