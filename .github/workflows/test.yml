name: test workflow

on:
  schedule:
    - cron: "25 8 * * *" # 15:25 ICT - Prediction Capture (PM) - Test
    - cron: "25 15 * * *" # 15:25 ICT - Prediction Capture (PM) - Test
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
